name: Railway – Start server (6:00 AM IST)

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:   # allow manual trigger

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - name: Resume Railway service
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", input: { numReplicas: 1 }) }"
            }' | tee response.json
          if grep -q '"errors"' response.json; then
            echo "Railway API returned errors:"
            cat response.json
            exit 1
          fi
          echo "Service resumed successfully."
